<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | DevBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .contact-card { border: none; border-radius: 15px; }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-5">
    <div class="container">
        <a class="navbar-brand h1 mb-0" href="index.html" style="text-decoration: none;">DevBlog</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm contact-card p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Ponte en contacto</h2>
                    <p class="text-muted">¿Tienes alguna duda o proyecto en mente? Escríbeme.</p>
                </div>

                <form id="contactForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" class="form-control" placeholder="Tu nombre" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Correo electrónico</label>
                        <input type="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mensaje</label>
                        <textarea class="form-control" rows="4" placeholder="¿En qué puedo ayudarte?" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">Enviar Mensaje</button>
                </form>

                <div class="mt-4 pt-3 border-top text-center">
                    <p class="small text-muted mb-2">O encuéntrame en:</p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="#" class="text-dark"><i class="bi bi-github fs-4"></i></a>
                        <a href="#" class="text-dark"><i class="bi bi-linkedin fs-4"></i></a>
                        <a href="#" class="text-dark"><i class="bi bi-envelope-at fs-4"></i></a>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <a href="index.html" class="text-decoration-none text-muted small">
                    <i class="bi bi-chevron-left"></i> Volver al inicio
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('¡Mensaje enviado con éxito! (Esto es una simulación)');
        this.reset();
    });
</script>

</body>
</html>
